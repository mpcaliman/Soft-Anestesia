<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f2540">
  <title>Centro Cirúrgico — Agendamento</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Overlay de carregamento -->
  <div id="loading-overlay" class="loading-overlay" style="display:none">
    <div class="spinner" aria-label="Carregando"></div>
  </div>

  <!-- =========================== LOGIN =========================== -->
  <div id="login-screen" class="login-screen" style="display:none">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">🏥</div>
        <h1 id="app-name">Centro Cirúrgico</h1>
        <p class="login-sub">Agendamento de procedimentos e cirurgias</p>
      </div>
      <form id="login-form" class="login-form" autocomplete="on">
        <label class="field">
          <span>E-mail</span>
          <input id="login-email" type="email" required autocomplete="username" placeholder="seu@email.com">
        </label>
        <label class="field">
          <span>Senha</span>
          <input id="login-password" type="password" required autocomplete="current-password" placeholder="••••••••">
        </label>
        <div id="login-error" class="form-error" role="alert"></div>
        <button type="submit" class="btn primary block">Entrar</button>
        <a href="#" id="forgot-password" class="link-muted">Esqueci minha senha</a>
      </form>
      <p class="login-foot">Acesso restrito. Usuários inativos não podem entrar.</p>
    </div>
  </div>

  <!-- ============================ APP ============================ -->
  <div id="app-screen" class="app-screen" style="display:none">

    <!-- Barra superior (mobile) -->
    <header class="topbar">
      <button id="menu-toggle" class="menu-toggle" aria-label="Menu">☰</button>
      <div class="topbar-title" id="center-name">Centro Cirúrgico</div>
      <div class="topbar-user"><span id="current-user-name"></span></div>
    </header>

    <!-- Menu lateral -->
    <nav class="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-logo">🏥</span>
        <div>
          <strong id="center-name-side">Centro Cirúrgico</strong>
          <small>Agendamento</small>
        </div>
      </div>
      <div id="main-menu" class="menu"></div>
      <div class="sidebar-foot">
        <span id="sidebar-user"></span>
      </div>
    </nav>

    <!-- Conteúdo do módulo ativo -->
    <main class="content">
      <div id="module-content" class="module-content"></div>
    </main>

    <!-- Fundo escuro do menu no mobile -->
    <div class="menu-backdrop" id="menu-backdrop"></div>
  </div>

  <!-- Host de notificações "toast" -->
  <div id="toast-host"></div>

  <!-- A aplicação usa ES Modules. config.js é gerado a partir de
       config.example.js e NÃO deve conter segredos. -->
  <script type="module" src="app.js"></script>

  <!-- Fecha o menu móvel ao tocar no fundo -->
  <script>
    document.getElementById('menu-backdrop')?.addEventListener('click', function () {
      document.getElementById('app-screen')?.classList.remove('menu-open');
    });
    // Reflete o nome do centro na barra lateral.
    var obs = new MutationObserver(function () {
      var n = document.getElementById('center-name');
      var side = document.getElementById('center-name-side');
      var su = document.getElementById('sidebar-user');
      var cu = document.getElementById('current-user-name');
      if (n && side) side.textContent = n.textContent;
      if (su && cu) su.textContent = cu.textContent;
    });
    obs.observe(document.body, { subtree: true, childList: true, characterData: true });
  </script>
</body>
</html>
